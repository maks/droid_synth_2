name: droid_synth_2
description: Emulator for a classic FM synth

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  msfa_plugin: ^0.0.1
  flutter_virtual_piano: ^0.0.6
  bonsai: ^1.2.0
  ninja_hex: ^2.0.1
  collection: ^1.17.0
  flutter_midi_command: ^0.5.4
  file_picker: ^5.3.2
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
